<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pet Rock</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main class="app">
            <h1>My Pet Rock</h1>

            <div class="rock-wrap">
                <img id="rockImage" src="rock images/download (2).jpg" alt="Your pet rock">
                <p id="moodText" class="mood">Mood: Calm</p>
            </div>

            <p id="happinessText">Happiness: 50</p>
            <div class="bar">
                <div id="fill" class="fill"></div>
            </div>

            <section class="stats">
                <div class="stat">
                    <span class="stat-label">Time decay</span>
                    <span id="decayText" class="stat-value">Checking...</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Last fed</span>
                    <span id="lastFedText" class="stat-value">Never</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Days alive</span>
                    <span id="daysAliveText" class="stat-value">Day 1</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Last quote</span>
                    <span id="lastQuote" class="stat-value">Nothing yet</span>
                </div>
            </section>

            <div class="feed-row">
                <input id="quote" placeholder="say something kind..." onkeypress="if(event.key==='Enter') feedRock()">
                <button onclick="feedRock()">Feed Rock</button>
            </div>

            <p id="response"></p>

            <section class="history">
                <h2>Recent Quotes</h2>
                <ol id="historyList"></ol>
            </section>
        </main>

        <script src="script.js" defer></script>
    </body>
</html>
